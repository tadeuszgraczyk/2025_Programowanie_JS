<!DOCTYPE html>

<body>
<h1>Zadanie 1</h1>
<pre>
    1.	Zadeklaruj zmienną tablicową o nazwie kolory.
    2.	W tablicy umieść sześć kolejnych liczb większych od 10 zapisanych w notacji szesnastkowej.
    3.	Za pomocą pętli forEach wyświetl te liczby w konsoli.

</pre>

<script>

    // 1. Deklarujemy zmienną tablicową o nazwie kolory.
    // Używamy const, ponieważ nie planujemy zmieniać referencji do tablicy.
    const kolory = [

        // 2. Umieszczamy sześć kolejnych liczb większych od 10
        // zapisanych w notacji szesnastkowej.
        // W JavaScript liczby w systemie szesnastkowym zapisujemy
        // z prefiksem 0x

        0x0B,  // 11 w systemie dziesiętnym
        0x0C,  // 12
        0x0D,  // 13
        0x0E,  // 14
        0x0F,  // 15
        0x10   // 16
    ];

    // 3. Wyświetlenie elementów tablicy za pomocą metody forEach().
    // forEach wykonuje funkcję dla każdego elementu tablicy.

    kolory.forEach(function(element, indeks) {

        // element – aktualna wartość z tablicy
        // indeks – numer pozycji w tablicy

        console.log("Indeks: " + indeks + ", wartość: " + element);

    });

</script>

</body>
</html>
