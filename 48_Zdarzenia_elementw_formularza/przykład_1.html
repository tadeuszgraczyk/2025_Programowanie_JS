<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Przykład zdarzenia formularza</title>
</head>
<body>
<form action="">
    <input type="text">
</form>
<script>
    const input = document.querySelector("input");
    input.addEventListener("focus", () => {
        console.log("Pole otrzymało focus!");
    });

    input.addEventListener("blur", () => {
        console.log("Pole straciło focus!");
    });
</script>
</body>
</html>
