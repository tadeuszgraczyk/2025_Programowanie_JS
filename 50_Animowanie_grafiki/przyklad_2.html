<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="movingBox" style="width: 50px; height: 50px; background-color: green; position: absolute; left: 0;">
</div>
<script>
  const box = document.getElementById("movingBox");
  let position = 0;
  function animate() {
    position += 1;
    box.style.left = position + "px";
    if (position < 300) {
      requestAnimationFrame(animate);
    }
  }
  animate();
</script>
</body>
</html>
