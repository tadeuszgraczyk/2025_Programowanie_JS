<!DOCTYPE html>
<html>
<head>
  <script>
    function ik2() {
      document.getElementById('ikona').src = "Ikona3.png";
    }
    function ik1() {
      document.getElementById('ikona').src = "Ikona1.png";
    };
  </script>
</head>
<body>
<img id="ikona" onmousedown="ik2()" onmouseup="ik1()" src="Ikona1.png"
     width="100" height="100" >
<p>Kliknij i przytrzymaj!</p>
</body>
</html>
